# PAC1 Agent Configuration
# Switch provider: change llm.provider to any key from [providers.*]
#
# REQUIRES: response_format: json_schema (strict) for Phase 1 structured CoT.
# Models that support this (tested):
#   ✅ Nemotron 120B (CF Workers AI) — primary, FREE
#   ✅ GPT-5.4 / GPT-5.4-mini (OpenAI) — paid
#   ✅ MiniMax M2.5 (DeepInfra) — best backup, $0.27/M
#   ✅ DeepSeek V3.x (DeepInfra) — FC works, reasoning weaker
#   ✅ Cerebras Qwen3 — FC works, multi-step weaker
#
# Models that DO NOT support strict json_schema (0 tool calls):
#   ❌ Kimi K2.5 — Phase 1 returns 0 reasoning calls
#   ❌ GLM-5.1 (reasoning model) — inconsistent, needs reasoning_effort=none
#   ❌ Step-3.5-Flash — no structured output support
#   ❌ Qwen3.5-397B — 0 tool calls on multi-step
#   ❌ gpt-oss-120b (Cerebras) — model not found / access denied

[agent]
max_steps = 20
benchmark = "bitgn/pac1-dev"

[llm]
provider = "openai"

# --- Providers ---

[providers.openai]
model = "gpt-5.4-mini"
api_key_env = "OPENAI_API_KEY"


[providers.openai-full]
model = "gpt-5.4"
api_key_env = "OPENAI_API_KEY"

[providers.kimi]
model = "@cf/moonshotai/kimi-k2.5"
base_url = "https://api.cloudflare.com/client/v4/accounts/33dec9645c443eef5859b1e10ce71e01/ai/v1"
api_key_env = "CF_AI_API_KEY"


[providers.kimi-gateway]
model = "workers-ai/@cf/moonshotai/kimi-k2.5"
base_url = "https://gateway.ai.cloudflare.com/v1/33dec9645c443eef5859b1e10ce71e01/superapi/compat"
api_key_env = "CF_AI_API_KEY"
temperature = 0.1
planning_temperature = 0.4

[providers.kimi-gateway.headers]
cf-aig-request-timeout = "300000"
x-session-affinity = "pac1-agent"

[providers.llama]
model = "workers-ai/@cf/meta/llama-3.3-70b-instruct-fp8-fast"
base_url = "https://gateway.ai.cloudflare.com/v1/33dec9645c443eef5859b1e10ce71e01/superapi/compat"
api_key_env = "CF_AI_API_KEY"

[providers.glm]
model = "workers-ai/@cf/zai-org/glm-4.7-flash"
base_url = "https://gateway.ai.cloudflare.com/v1/33dec9645c443eef5859b1e10ce71e01/superapi/compat"
api_key_env = "CF_AI_API_KEY"

[providers.glm5]
model = "zai-org/GLM-5.1-FP8"
base_url = "https://api.us-west-2.modal.direct/v1"
api_key_env = "MODAL_API_KEY"
temperature = 0.1
use_chat_api = true
reasoning_effort = "none"

[providers.nemotron]
model = "workers-ai/@cf/nvidia/nemotron-3-120b-a12b"
base_url = "https://gateway.ai.cloudflare.com/v1/33dec9645c443eef5859b1e10ce71e01/superapi/compat"
api_key_env = "CF_AI_API_KEY"
prompt_mode = "v2"
temperature = 0.05
planning_temperature = 0.15
sgr_mode = false  # experimental: multi-action works but Nemotron loops on complex tasks
[providers.nemotron.headers]
cf-aig-request-timeout = "300000"
cf-aig-cache-ttl = "3600"
x-session-affinity = "pac1-agent"

# AI-NOTE: nemotron-fast (Super) and nemotron-70b removed — reasoning models don't do multi-step FC

[providers.step]
