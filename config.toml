# PAC1 Agent Configuration
# Switch provider: change llm.provider to any key from [providers.*]
#
# REQUIRES: two-phase FC with complex tool schemas on 7K+ context.
# FC probe at agent start validates compatibility. Quick test: --task t01 + --task t16.
#
# Working models (pass t01+t16):
#   ✅ Nemotron 120B (CF) — 95% full bench, FREE, primary
#   ✅ GPT-5.4 (OpenAI) — paid, final validation only
#   ✅ MiniMax M2.5 (DeepInfra) — 64% sample, $0.27/M
#   ✅ Seed-2.0-pro (DeepInfra) — 81-88% full bench, $0.35/M
#   ✅ DeepSeek V3.2 (DeepInfra) — t16 ok, t01 fails, $0.26/M
#   ✅ Cerebras Qwen3 — t16 ok, t01 fails
#
# Rejected models (tested 2026-04-10, DO NOT re-test):
#   ❌ Kimi K2.5 (CF) — Phase 1 unreliable on long context
#   ❌ Kimi-K2.5-Turbo (DeepInfra) — 58% full bench, unstable
#   ❌ GLM-5.1 (DeepInfra/Modal/OpenRouter) — 287s/call, too slow
#   ❌ Step-3.5-Flash (DeepInfra) — 0 tool calls, no strict schema
#   ❌ Qwen3.5-397B (DeepInfra) — 0 tool calls on multi-step
#   ❌ Qwen3.5-122B (DeepInfra) — t01 fails
#   ❌ Qwen3-Max (DeepInfra) — t01 fails, $0.72/M
#   ❌ Llama-4 Maverick (DeepInfra) — t01 fails
#   ❌ Nemotron 340B (DeepInfra) — 0 tool calls
#   ❌ Gemini 2.5 Pro/Flash (DeepInfra) — 0 tool calls
#   ❌ gpt-oss-120b (Cerebras) — model not found
#   ❌ GLM-4.7 (Cerebras) — t01+t16 fail
#   ❌ Mistral Medium 3.1 (OpenRouter) — probe ok, t16 fails
#   ❌ Hermes-4-405B (OpenRouter) — no FC endpoint support

[agent]
max_steps = 30
benchmark = "bitgn/pac1-prod"
run_prefix = "rustman.org"
fallback_providers = ["seed2", "openai-full"]  # ensemble: primary → fallbacks in order, skip self

[defaults]
temperature = 0.05
planning_temperature = 0.15
prompt_cache_key = "pac1-v1"

# Embeddings for intent/security reclassification (default: CF bge-m3, FREE + multilingual)
[embeddings]
model = "workers-ai/@cf/baai/bge-m3"
base_url = "https://gateway.ai.cloudflare.com/v1/33dec9645c443eef5859b1e10ce71e01/superapi/compat"
api_key_env = "CF_AI_API_KEY"

[llm]
provider = "openai"

# --- Working Providers ---

[providers.nemotron]
model = "workers-ai/@cf/nvidia/nemotron-3-120b-a12b"
[providers.nemotron.pricing]
