# PAC1 Agent Configuration
# Switch provider: change llm.provider to any key from [providers.*]

[agent]
max_steps = 20
benchmark = "bitgn/pac1-dev"

[llm]
provider = "kimi-gateway"

# --- Providers ---

[providers.openai]
model = "gpt-5.4-mini"
api_key_env = "OPENAI_API_KEY"

[providers.openai-full]
model = "gpt-5.4"
api_key_env = "OPENAI_API_KEY"

[providers.kimi]
model = "@cf/moonshotai/kimi-k2.5"
base_url = "https://api.cloudflare.com/client/v4/accounts/33dec9645c443eef5859b1e10ce71e01/ai/v1"
api_key = "REDACTED_CF_KEY"

[providers.kimi-gateway]
model = "workers-ai/@cf/moonshotai/kimi-k2.5"
base_url = "https://gateway.ai.cloudflare.com/v1/33dec9645c443eef5859b1e10ce71e01/superapi/compat"
api_key = "REDACTED_CF_KEY"

[providers.llama]
model = "workers-ai/@cf/meta/llama-3.3-70b-instruct-fp8-fast"
base_url = "https://gateway.ai.cloudflare.com/v1/33dec9645c443eef5859b1e10ce71e01/superapi/compat"
api_key = "REDACTED_CF_KEY"

[providers.gemini]
model = "gemini-3.1-pro-preview"
api_key_env = "GEMINI_API_KEY"
