# PAC1 Agent Configuration
# Switch provider: change llm.provider to any key from [providers.*]

[agent]
max_steps = 20
benchmark = "bitgn/pac1-dev"

[llm]
provider = "openai"

# --- Providers ---

[providers.openai]
model = "gpt-5.4-mini"
api_key_env = "OPENAI_API_KEY"


[providers.openai-full]
model = "gpt-5.4"
api_key_env = "OPENAI_API_KEY"

[providers.kimi]
model = "@cf/moonshotai/kimi-k2.5"
base_url = "https://api.cloudflare.com/client/v4/accounts/33dec9645c443eef5859b1e10ce71e01/ai/v1"
api_key_env = "CF_AI_API_KEY"


[providers.kimi-gateway]
model = "workers-ai/@cf/moonshotai/kimi-k2.5"
base_url = "https://gateway.ai.cloudflare.com/v1/33dec9645c443eef5859b1e10ce71e01/superapi/compat"
api_key_env = "CF_AI_API_KEY"

[providers.kimi-gateway.headers]
cf-aig-request-timeout = "300000"

[providers.llama]
model = "workers-ai/@cf/meta/llama-3.3-70b-instruct-fp8-fast"
base_url = "https://gateway.ai.cloudflare.com/v1/33dec9645c443eef5859b1e10ce71e01/superapi/compat"
api_key_env = "CF_AI_API_KEY"

[providers.glm]
model = "workers-ai/@cf/zhipuai/glm-4.7-flash"
base_url = "https://gateway.ai.cloudflare.com/v1/33dec9645c443eef5859b1e10ce71e01/superapi/compat"
api_key_env = "CF_AI_API_KEY"

[providers.nemotron]
model = "workers-ai/@cf/nvidia/nemotron-3-120b-a12b"
base_url = "https://gateway.ai.cloudflare.com/v1/33dec9645c443eef5859b1e10ce71e01/superapi/compat"
api_key_env = "CF_AI_API_KEY"

temperature = 0.1
planning_temperature = 0.4
sgr_mode = false  # experimental: multi-action works but Nemotron loops on complex tasks
[providers.nemotron.headers]
cf-aig-request-timeout = "300000"
x-session-affinity = "pac1-agent"

# AI-NOTE: Keychain auth uses Claude Code subscription OAuth token (sk-ant-oat01-...).
# Haiku works. Sonnet/opus get 429 (subscription rate limit on premium models).
# Token expires ~8h — restart agent if you get 401. See sgr-agent/providers/CLAUDE_PROXY_RESEARCH.md.
[providers.claude]
model = "claude-sonnet-4-6"
auth = "keychain"

[providers.claude-haiku]
model = "claude-haiku-4-5-20251001"
auth = "keychain"


[providers.gemma4]
model = "workers-ai/@cf/google/gemma-4-26b-a4b-it"
base_url = "https://gateway.ai.cloudflare.com/v1/33dec9645c443eef5859b1e10ce71e01/superapi/compat"
api_key_env = "CF_AI_API_KEY"

temperature = 0.1
[providers.gemma4.headers]
cf-aig-request-timeout = "300000"

[providers.qwen]
model = "qwen/qwen3.6-plus:free"
base_url = "https://openrouter.ai/api/v1"
api_key_env = "OPENROUTER_API_KEY"

[providers.gemini]
model = "gemini-3.1-pro-preview"
api_key_env = "GEMINI_API_KEY"
