# PAC1 Agent Configuration
# Switch provider: change llm.provider to any key from [providers.*]

[agent]
max_steps = 20
benchmark = "bitgn/pac1-dev"

[llm]
provider = "openai"

# --- Providers ---

[providers.openai]
model = "gpt-5.4-mini"
api_key_env = "OPENAI_API_KEY"


[providers.openai-full]
model = "gpt-5.4"
api_key_env = "OPENAI_API_KEY"

[providers.kimi]
model = "@cf/moonshotai/kimi-k2.5"
base_url = "https://api.cloudflare.com/client/v4/accounts/33dec9645c443eef5859b1e10ce71e01/ai/v1"
api_key_env = "CF_AI_API_KEY"


[providers.kimi-gateway]
model = "workers-ai/@cf/moonshotai/kimi-k2.5"
base_url = "https://gateway.ai.cloudflare.com/v1/33dec9645c443eef5859b1e10ce71e01/superapi/compat"
api_key_env = "CF_AI_API_KEY"
temperature = 0.1
planning_temperature = 0.4

[providers.kimi-gateway.headers]
cf-aig-request-timeout = "300000"
x-session-affinity = "pac1-agent"

[providers.llama]
model = "workers-ai/@cf/meta/llama-3.3-70b-instruct-fp8-fast"
base_url = "https://gateway.ai.cloudflare.com/v1/33dec9645c443eef5859b1e10ce71e01/superapi/compat"
api_key_env = "CF_AI_API_KEY"

[providers.glm]
model = "workers-ai/@cf/zai-org/glm-4.7-flash"
base_url = "https://gateway.ai.cloudflare.com/v1/33dec9645c443eef5859b1e10ce71e01/superapi/compat"
api_key_env = "CF_AI_API_KEY"

[providers.glm5]
model = "zai-org/GLM-5.1-FP8"
base_url = "https://api.us-west-2.modal.direct/v1"
api_key_env = "MODAL_API_KEY"
temperature = 0.1
use_chat_api = true
reasoning_effort = "none"

[providers.nemotron]
model = "workers-ai/@cf/nvidia/nemotron-3-120b-a12b"
base_url = "https://gateway.ai.cloudflare.com/v1/33dec9645c443eef5859b1e10ce71e01/superapi/compat"
api_key_env = "CF_AI_API_KEY"
prompt_mode = "v2"
temperature = 0.05
planning_temperature = 0.15
sgr_mode = false  # experimental: multi-action works but Nemotron loops on complex tasks
[providers.nemotron.headers]
cf-aig-request-timeout = "300000"
cf-aig-cache-ttl = "3600"
x-session-affinity = "pac1-agent"

# AI-NOTE: nemotron-fast (Super) and nemotron-70b removed — reasoning models don't do multi-step FC

[providers.qwen35]
model = "Qwen/Qwen3.5-122B-A10B"
base_url = "https://api.deepinfra.com/v1/openai"
api_key_env = "DEEPINFRA_API_KEY"
temperature = 0.1
use_chat_api = true
# $0.29/$2.90 per 1M, 262K context, SOTA reasoning

[providers.llama4]
model = "meta-llama/Llama-4-Maverick-17B-128E-Instruct-Turbo"
base_url = "https://api.deepinfra.com/v1/openai"
api_key_env = "DEEPINFRA_API_KEY"
temperature = 0.1
use_chat_api = true
# $0.50/$0.50 per 1M, 1M context, 128 experts

[providers.minimax]
model = "MiniMaxAI/MiniMax-M2.5"
base_url = "https://api.deepinfra.com/v1/openai"
api_key_env = "DEEPINFRA_API_KEY"
temperature = 0.1
use_chat_api = true
# $0.27/$0.95 per 1M, 80.2% SWE-bench

[providers.deepseek]
model = "deepseek-ai/DeepSeek-V3.2"
base_url = "https://api.deepinfra.com/v1/openai"
api_key_env = "DEEPINFRA_API_KEY"
temperature = 0.1
use_chat_api = true
# $0.26/$0.38 per 1M, 163K context, optimized for agents

# AI-NOTE: deepseek-terminus, gpt-oss, mistral-small removed — all failed t01 (wrong file deletion)

[providers.qwen3]
model = "Qwen/Qwen3-235B-A22B-Instruct-2507"
base_url = "https://api.deepinfra.com/v1/openai"
api_key_env = "DEEPINFRA_API_KEY"
temperature = 0.1
use_chat_api = true
prompt_cache_key = "pac1-v1"
reasoning_effort = "none"  # $0.071/$0.10 per 1M, 262K context

[providers.cerebras]
model = "qwen-3-235b-a22b-instruct-2507"
base_url = "https://api.cerebras.ai/v1"
api_key_env = "CEREBRAS_API_KEY"
temperature = 0.1
use_chat_api = true
# FREE up to 1M tokens, ~0.66s per call, FC native

[providers.cerebras-glm]
model = "zai-glm-4.7"
base_url = "https://api.cerebras.ai/v1"
api_key_env = "CEREBRAS_API_KEY"
temperature = 0.1
use_chat_api = true
reasoning_effort = "none"
# GLM-4.7 on Cerebras, ~1000 tok/s

[providers.nemotron-v2]
model = "workers-ai/@cf/nvidia/nemotron-3-120b-a12b"
base_url = "https://gateway.ai.cloudflare.com/v1/33dec9645c443eef5859b1e10ce71e01/superapi/compat"
api_key_env = "CF_AI_API_KEY"
prompt_mode = "v2"
temperature = 0.1
planning_temperature = 0.4
[providers.nemotron-v2.headers]
cf-aig-request-timeout = "300000"
x-session-affinity = "pac1-agent"

# AI-NOTE: Keychain auth uses Claude Code subscription OAuth token (sk-ant-oat01-...).
# Haiku works. Sonnet/opus get 429 (subscription rate limit on premium models).
# Token expires ~8h — restart agent if you get 401. See sgr-agent/providers/CLAUDE_PROXY_RESEARCH.md.
[providers.claude]
model = "claude-sonnet-4-6"
auth = "keychain"

[providers.claude-haiku]
model = "claude-haiku-4-5-20251001"
auth = "keychain"


[providers.gemma4]
model = "workers-ai/@cf/google/gemma-4-26b-a4b-it"
base_url = "https://gateway.ai.cloudflare.com/v1/33dec9645c443eef5859b1e10ce71e01/superapi/compat"
api_key_env = "CF_AI_API_KEY"

temperature = 0.1
[providers.gemma4.headers]
cf-aig-request-timeout = "300000"

[providers.qwen36]
model = "qwen/qwen3.6-plus:free"
base_url = "https://openrouter.ai/api/v1"
api_key_env = "OPENROUTER_API_KEY"
temperature = 0.1
use_chat_api = true

[providers.glm51]
model = "z-ai/glm-5.1"
base_url = "https://openrouter.ai/api/v1"
api_key_env = "OPENROUTER_API_KEY"
temperature = 0.1
use_chat_api = true

[providers.gemini]
model = "gemini-3.1-pro-preview"
api_key_env = "GEMINI_API_KEY"

[providers.openai-v2]
model = "gpt-5.4"
api_key_env = "OPENAI_API_KEY"
prompt_mode = "v2"
